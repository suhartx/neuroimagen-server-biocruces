services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuroimagen}
      POSTGRES_USER: ${POSTGRES_USER:-neuroimagen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuroimagen}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neuroimagen:neuroimagen@postgres:5432/neuroimagen}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/data/studies}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.nii,.nii.gz,.dcm,.zip,.tar,.tar.gz,.gz,.json,.txt}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
      PROCESSOR_NAME: ${PROCESSOR_NAME:-dummy-development-processor}
      PROCESSOR_VERSION: ${PROCESSOR_VERSION:-0.1.0}
      PROCESSOR_COMMAND: ${PROCESSOR_COMMAND:-python /app/external_processor/dummy_processor.py --input {input_dir} --output {output_dir} --study-id {study_id}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neuroimagen:neuroimagen@postgres:5432/neuroimagen}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/data/studies}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.nii,.nii.gz,.dcm,.zip,.tar,.tar.gz,.gz,.json,.txt}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
      PROCESSOR_NAME: ${PROCESSOR_NAME:-dummy-development-processor}
      PROCESSOR_VERSION: ${PROCESSOR_VERSION:-0.1.0}
      PROCESSOR_COMMAND: ${PROCESSOR_COMMAND:-python /app/external_processor/dummy_processor.py --input {input_dir} --output {output_dir} --study-id {study_id}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: celery -A worker.celery_app.celery_app worker --loglevel=INFO

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api

  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  postgres-data:
  redis-data:
