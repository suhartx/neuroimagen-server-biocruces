services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuroimagen}
      POSTGRES_USER: ${POSTGRES_USER:-neuroimagen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuroimagen}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neuroimagen:neuroimagen@postgres:5432/neuroimagen}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/data/studies}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.nii,.nii.gz,.dcm,.zip,.tar,.tar.gz,.gz,.json,.txt}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
      PROCESSOR_NAME: ${PROCESSOR_NAME:-dummy-development-processor}
      PROCESSOR_VERSION: ${PROCESSOR_VERSION:-0.1.0}
      PROCESSOR_BACKEND: ${PROCESSOR_BACKEND:-dummy}
      PROCESSOR_COMMAND: ${PROCESSOR_COMMAND:-python /app/external_processor/dummy_processor.py --input {input_dir} --output {output_dir} --study-id {study_id}}
      COMPNEURO_CONTAINER_IMAGE: ${COMPNEURO_CONTAINER_IMAGE:-compneurobilbaolab/compneuro-anatproc:1.1}
      COMPNEURO_PROJECT_MOUNT: ${COMPNEURO_PROJECT_MOUNT:-/project}
      COMPNEURO_COMMAND: ${COMPNEURO_COMMAND:-bash /app/src/apreproc_launcher.sh}
      PROCESSING_TIMEOUT_SECONDS: ${PROCESSING_TIMEOUT_SECONDS:-0}
      MAX_CONCURRENT_PROCESSING_JOBS: ${MAX_CONCURRENT_PROCESSING_JOBS:-1}
      GENERATE_OUTPUT_ZIP: ${GENERATE_OUTPUT_ZIP:-true}
      GENERATE_TECHNICAL_PDF: ${GENERATE_TECHNICAL_PDF:-true}
      GENERATE_RENDERED_PNG: ${GENERATE_RENDERED_PNG:-true}
      NIFTI_RENDERER: ${NIFTI_RENDERER:-slicer}
      NIFTI_RENDER_MAX_FILES: ${NIFTI_RENDER_MAX_FILES:-50}
      NIFTI_RENDER_TIMEOUT_SECONDS: ${NIFTI_RENDER_TIMEOUT_SECONDS:-300}
      TECHNICAL_REPORT_FILENAME: ${TECHNICAL_REPORT_FILENAME:-technical_report.pdf}
      BIDS_VALIDATE: ${BIDS_VALIDATE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: ${WORKER_DOCKERFILE:-backend/Dockerfile}
      args:
        COMPNEURO_ANATPROC_REF: ${COMPNEURO_ANATPROC_REF:-a2f3e7c9523ed521c3f85f7dffde5ee8fb400842}
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neuroimagen:neuroimagen@postgres:5432/neuroimagen}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/data/studies}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.nii,.nii.gz,.dcm,.zip,.tar,.tar.gz,.gz,.json,.txt}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
      PROCESSOR_NAME: ${PROCESSOR_NAME:-dummy-development-processor}
      PROCESSOR_VERSION: ${PROCESSOR_VERSION:-0.1.0}
      PROCESSOR_BACKEND: ${PROCESSOR_BACKEND:-dummy}
      PROCESSOR_COMMAND: ${PROCESSOR_COMMAND:-python /app/external_processor/dummy_processor.py --input {input_dir} --output {output_dir} --study-id {study_id}}
      COMPNEURO_CONTAINER_IMAGE: ${COMPNEURO_CONTAINER_IMAGE:-compneurobilbaolab/compneuro-anatproc:1.1}
      COMPNEURO_PROJECT_MOUNT: ${COMPNEURO_PROJECT_MOUNT:-/project}
      COMPNEURO_COMMAND: ${COMPNEURO_COMMAND:-bash /app/src/apreproc_launcher.sh}
      PROCESSING_TIMEOUT_SECONDS: ${PROCESSING_TIMEOUT_SECONDS:-0}
      MAX_CONCURRENT_PROCESSING_JOBS: ${MAX_CONCURRENT_PROCESSING_JOBS:-1}
      GENERATE_OUTPUT_ZIP: ${GENERATE_OUTPUT_ZIP:-true}
      GENERATE_TECHNICAL_PDF: ${GENERATE_TECHNICAL_PDF:-true}
      GENERATE_RENDERED_PNG: ${GENERATE_RENDERED_PNG:-true}
      NIFTI_RENDERER: ${NIFTI_RENDERER:-slicer}
      NIFTI_RENDER_MAX_FILES: ${NIFTI_RENDER_MAX_FILES:-50}
      NIFTI_RENDER_TIMEOUT_SECONDS: ${NIFTI_RENDER_TIMEOUT_SECONDS:-300}
      TECHNICAL_REPORT_FILENAME: ${TECHNICAL_REPORT_FILENAME:-technical_report.pdf}
      BIDS_VALIDATE: ${BIDS_VALIDATE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: sh -c "celery -A worker.celery_app.celery_app worker --loglevel=INFO --concurrency=$${MAX_CONCURRENT_PROCESSING_JOBS:-1}"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api

  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  postgres-data:
  redis-data:
